# Production compose for a single VM with host-installed Postgres and a host-
# installed reverse proxy (Caddy / nginx / etc). Containers reach Postgres via
# host.docker.internal; the host reverse-proxies to web:3000 and api:4000 via
# the localhost port bindings below.
# Usage: ./scripts/deploy.sh

services:
  redis:
    image: redis:7-alpine
    container_name: mergecrew-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 6

  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: ghcr.io/mergecrew/api:${MERGECREW_TAG:-latest}
    profiles: [migrate]
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    # Prisma 7 reads connection config from prisma.config.ts (#794 /
    # #819). The file lives at packages/db/prisma.config.ts; without
    # --config the CLI searches cwd and the schema's parent dir
    # (/app/packages/db/prisma) and finds neither, then bails with
    # "datasource.url required". Same fix as docker-compose.full.yml's
    # migrate service.
    command:
      [
        "/app/apps/api/node_modules/.bin/prisma",
        "migrate",
        "deploy",
        "--config",
        "/app/packages/db/prisma.config.ts",
        "--schema",
        "/app/packages/db/prisma/schema.prisma",
      ]

  # Per-service `deploy.resources.limits` (#187). In non-swarm Compose v2
  # these are honored as cgroup limits at `up` time. Runner is the most
  # important to cap because it executes user-derived agent workloads that
  # can spawn build / test child processes; an unbounded runner can starve
  # sibling containers on a shared host.
  #
  # Tune via env: `RUNNER_CPU_LIMIT`, `RUNNER_MEM_LIMIT`, etc. Defaults are
  # sized for a 4-vCPU / 8 GB single-VM deploy.
  #
  # For Kubernetes / ECS Fargate: translate these to the equivalent
  # `resources.limits` block in the relevant manifest. Same numbers carry
  # over directly.

  # `./secrets:/app/secrets:ro` is mounted on every service that constructs a
  # `GitHubProvider` — drop the App's `.pem` there and set
  # `GITHUB_APP_PRIVATE_KEY_FILE=/app/secrets/github-app.pem` in `.env` to
  # avoid pasting a multi-line PEM into env vars.
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: ghcr.io/mergecrew/api:${MERGECREW_TAG:-latest}
    container_name: mergecrew-api
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    ports:
      - '127.0.0.1:${API_HOST_PORT:-4000}:4000'
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${API_CPU_LIMIT:-1}'
          memory: ${API_MEM_LIMIT:-1g}

  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.orchestrator
    image: ghcr.io/mergecrew/orchestrator:${MERGECREW_TAG:-latest}
    container_name: mergecrew-orchestrator
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${ORCHESTRATOR_CPU_LIMIT:-0.5}'
          memory: ${ORCHESTRATOR_MEM_LIMIT:-512m}

  runner:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.runner
    image: ghcr.io/mergecrew/runner:${MERGECREW_TAG:-latest}
    container_name: mergecrew-runner
    restart: unless-stopped
    env_file: .env
    environment:
      # Same path on both sides of the bind mount below — the
      # DockerDriver passes this as the source path of the sandbox
      # container's `-v workspacePath:/workspace`, and that source is
      # resolved by the **host** daemon. EPIC #828.
      RUNNER_WORKSPACE_ROOT: /var/mergecrew/work
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    volumes:
      - ./secrets:/app/secrets:ro
      # Persisted transcripts (TRANSCRIPT_LOCAL_DIR in .env). The image
      # pre-creates this path chowned to the `node` user, so the volume
      # initializes with the right ownership on first mount.
      - transcripts:/var/mergecrew/transcripts
      # Docker-out-of-docker wiring (EPIC #828). Required for
      # RUNNER_SANDBOX=docker. The runner-entrypoint.sh resolves the
      # host docker group's GID at boot. If you don't want DooD,
      # comment these two out and set RUNNER_SANDBOX=process (or
      # leave the runner as a host process).
      - /var/run/docker.sock:/var/run/docker.sock
      # Host workspace path. MUST exist with uid:gid 1000:1000 (the
      # `node` user) before `docker compose up` — see
      # docs/03-infrastructure/16-self-host-runbook.md § "Deploy to
      # EC2". The path is the SAME on host and inside the container
      # so the runner's workspacePath strings are resolvable by the
      # host daemon when it processes sandbox `-v` flags.
      - /var/mergecrew/work:/var/mergecrew/work
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${RUNNER_CPU_LIMIT:-1}'
          memory: ${RUNNER_MEM_LIMIT:-1g}

  worker-cron:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker-cron
    image: ghcr.io/mergecrew/worker-cron:${MERGECREW_TAG:-latest}
    container_name: mergecrew-worker-cron
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${WORKER_CRON_CPU_LIMIT:-0.25}'
          memory: ${WORKER_CRON_MEM_LIMIT:-256m}

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    image: ghcr.io/mergecrew/web:${MERGECREW_TAG:-latest}
    container_name: mergecrew-web
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:4000
    networks: [internal]
    ports:
      - '127.0.0.1:${WEB_HOST_PORT:-3000}:3000'
    depends_on: [api]
    deploy:
      resources:
        limits:
          cpus: '${WEB_CPU_LIMIT:-0.5}'
          memory: ${WEB_MEM_LIMIT:-512m}

networks:
  internal:

volumes:
  redis_data:
  transcripts:
