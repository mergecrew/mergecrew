# Production compose for a single VM with host-installed Postgres and a host-
# installed reverse proxy (Caddy / nginx / etc). Containers reach Postgres via
# host.docker.internal; the host reverse-proxies to web:3000 and api:4000 via
# the localhost port bindings below.
# Usage: ./scripts/deploy.sh

services:
  redis:
    image: redis:7-alpine
    container_name: mergecrew-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 6

  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: ghcr.io/mergecrew/api:${MERGECREW_TAG:-latest}
    profiles: [migrate]
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    command: ["/app/apps/api/node_modules/.bin/prisma", "migrate", "deploy", "--schema", "/app/packages/db/prisma/schema.prisma"]

  # Per-service `deploy.resources.limits` (#187). In non-swarm Compose v2
  # these are honored as cgroup limits at `up` time. Runner is the most
  # important to cap because it executes user-derived agent workloads that
  # can spawn build / test child processes; an unbounded runner can starve
  # sibling containers on a shared host.
  #
  # Tune via env: `RUNNER_CPU_LIMIT`, `RUNNER_MEM_LIMIT`, etc. Defaults are
  # sized for a 4-vCPU / 8 GB single-VM deploy.
  #
  # For Kubernetes / ECS Fargate: translate these to the equivalent
  # `resources.limits` block in the relevant manifest. Same numbers carry
  # over directly.

  # `./secrets:/app/secrets:ro` is mounted on every service that constructs a
  # `GitHubProvider` — drop the App's `.pem` there and set
  # `GITHUB_APP_PRIVATE_KEY_FILE=/app/secrets/github-app.pem` in `.env` to
  # avoid pasting a multi-line PEM into env vars.
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: ghcr.io/mergecrew/api:${MERGECREW_TAG:-latest}
    container_name: mergecrew-api
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    ports:
      - '127.0.0.1:${API_HOST_PORT:-4000}:4000'
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${API_CPU_LIMIT:-1}'
          memory: ${API_MEM_LIMIT:-1g}

  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.orchestrator
    image: ghcr.io/mergecrew/orchestrator:${MERGECREW_TAG:-latest}
    container_name: mergecrew-orchestrator
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${ORCHESTRATOR_CPU_LIMIT:-0.5}'
          memory: ${ORCHESTRATOR_MEM_LIMIT:-512m}

  runner:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.runner
    image: ghcr.io/mergecrew/runner:${MERGECREW_TAG:-latest}
    container_name: mergecrew-runner
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    volumes:
      - ./secrets:/app/secrets:ro
      # Persisted transcripts (TRANSCRIPT_LOCAL_DIR in .env). The image
      # pre-creates this path chowned to the `node` user, so the volume
      # initializes with the right ownership on first mount.
      - transcripts:/var/mergecrew/transcripts
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${RUNNER_CPU_LIMIT:-1}'
          memory: ${RUNNER_MEM_LIMIT:-1g}

  worker-cron:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker-cron
    image: ghcr.io/mergecrew/worker-cron:${MERGECREW_TAG:-latest}
    container_name: mergecrew-worker-cron
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '${WORKER_CRON_CPU_LIMIT:-0.25}'
          memory: ${WORKER_CRON_MEM_LIMIT:-256m}

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    image: ghcr.io/mergecrew/web:${MERGECREW_TAG:-latest}
    container_name: mergecrew-web
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:4000
    networks: [internal]
    ports:
      - '127.0.0.1:${WEB_HOST_PORT:-3000}:3000'
    depends_on: [api]
    deploy:
      resources:
        limits:
          cpus: '${WEB_CPU_LIMIT:-0.5}'
          memory: ${WEB_MEM_LIMIT:-512m}

networks:
  internal:

volumes:
  redis_data:
  transcripts:
