apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mergecrew.fullname" . }}-orchestrator
  labels:
    {{- include "mergecrew.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  replicas: {{ .Values.replicaCount.orchestrator }}
  selector:
    matchLabels:
      {{- include "mergecrew.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        {{- include "mergecrew.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: orchestrator
          image: "{{ .Values.image.orchestrator.repository }}:{{ .Values.image.orchestrator.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: probe
              containerPort: 9090
              protocol: TCP
          env:
            {{- include "mergecrew.env" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.orchestrator | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
