apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mergecrew.fullname" . }}-runner
  labels:
    {{- include "mergecrew.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: {{ .Values.replicaCount.runner }}
  selector:
    matchLabels:
      {{- include "mergecrew.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- include "mergecrew.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: runner
          image: "{{ .Values.image.runner.repository }}:{{ .Values.image.runner.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: probe
              containerPort: 9091
              protocol: TCP
          env:
            {{- include "mergecrew.env" . | nindent 12 }}
            - name: RUNNER_HEALTH_PORT
              value: "9091"
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.runner | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
