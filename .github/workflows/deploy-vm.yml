name: Deploy to VM (GHCR)

# Build all five service images, push them to GHCR tagged with the commit SHA
# and `latest`, then SSH into the production VM and run scripts/deploy-pull.sh
# to roll forward. Replaces the manual SSH + `./scripts/deploy.sh` workflow.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'infra/docker/**'
      - 'docker-compose.prod.yml'
      - 'scripts/deploy-pull.sh'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-vm.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/mergecrew

jobs:
  build-and-push:
    if: ${{ vars.VM_DEPLOY_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, orchestrator, runner, worker-cron, web]
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ steps.tag.outputs.image_tag }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build-and-push
    if: ${{ vars.VM_DEPLOY_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Compute image tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      # We rely on the VM having the repo cloned at ${{ vars.VM_REPO_PATH }}
      # (default /home/ec2-user/data/mergecrew). The deploy step fast-forwards
      # the working tree to the commit being shipped so docker-compose.prod.yml
      # and scripts/deploy-pull.sh on disk match the images we just pushed.
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd "${{ vars.VM_REPO_PATH || '/home/ec2-user/data/mergecrew' }}"
            git fetch --quiet origin main
            git checkout --quiet "$GITHUB_SHA"
            ./scripts/deploy-pull.sh "${GITHUB_SHA:0:12}"

      - name: Summarize
        if: always()
        run: |
          {
            echo "### VM deploy"
            echo ""
            echo "- branch: \`${{ github.ref_name }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- tag pushed: \`${{ steps.tag.outputs.image_tag }}\`"
            echo "- result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
