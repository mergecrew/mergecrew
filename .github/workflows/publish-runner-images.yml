name: Publish runner workspace images

# Builds the per-run workspace images that the docker SandboxDriver
# (#557) launches into. Publishes to ghcr.io/mergecrew/runner-<stack>.
# Distinct from `deploy-services.yml`, which builds the supervisor
# images that run the BullMQ workers.
#
# Triggers:
#   * tag `runner-node-v*` → publish that tag verbatim (e.g.
#     `runner-node-v20.1.0` → ghcr.io/mergecrew/runner-node:20.1.0)
#     plus rolling `:20` for the major-version tag
#   * push to main when the image source changes → rolling `:20`
#   * workflow_dispatch → on-demand republish with a chosen tag
#
# Later phases (#567) add runner-python, runner-java, runner-go, and
# runner-polyglot using the same workflow shape.

on:
  push:
    branches: [main]
    paths:
      - 'infra/images/runner-node/**'
      - '.github/workflows/publish-runner-images.yml'
    tags:
      - 'runner-node-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. 20, 20.1.0, edge)'
        required: false
        default: '20'

concurrency:
  group: publish-runner-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  runner-node:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/mergecrew/runner-node
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tags
        id: tags
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          dispatch_tag="${{ github.event.inputs.tag }}"
          if [[ "$GITHUB_REF" == refs/tags/runner-node-v* ]]; then
            full="${ref#runner-node-v}"   # e.g. 20.1.0
            major="${full%%.*}"           # e.g. 20
            echo "primary=$full" >> "$GITHUB_OUTPUT"
            echo "major=$major" >> "$GITHUB_OUTPUT"
          elif [[ -n "$dispatch_tag" ]]; then
            echo "primary=$dispatch_tag" >> "$GITHUB_OUTPUT"
            echo "major=" >> "$GITHUB_OUTPUT"
          else
            # push to main with image source changes → rolling :20
            echo "primary=20" >> "$GITHUB_OUTPUT"
            echo "major=" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_tag=20-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: infra/images/runner-node
          file: infra/images/runner-node/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tags.outputs.primary }}
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.major != '' && format('{0}:{1}', env.IMAGE, steps.tags.outputs.major) || '' }}
          provenance: false
          cache-from: type=gha,scope=runner-node
          cache-to: type=gha,scope=runner-node,mode=max

      - name: Image contract — required tools are present
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.tags.outputs.primary }}"
          docker pull "$IMG"
          for bin in bash git curl tini mise; do
            docker run --rm --entrypoint sh "$IMG" -c "command -v $bin >/dev/null || { echo \"$bin not present\"; exit 1; }"
          done

      - name: Image contract — user is mergecrew uid 1001
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.tags.outputs.primary }}"
          uid=$(docker run --rm "$IMG" id -u)
          [ "$uid" = "1001" ] || { echo "uid is $uid, expected 1001"; exit 1; }

      - name: Image contract — /workspace exists and is writable by uid 1001
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.tags.outputs.primary }}"
          docker run --rm "$IMG" sh -c 'echo ok > /workspace/.contract && cat /workspace/.contract'

      - name: Image contract — size budget (≤ 250 MB compressed)
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.tags.outputs.primary }}"
          # Sum compressed layer sizes from the amd64 platform manifest.
          digest=$(docker buildx imagetools inspect "$IMG" --raw \
            | jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')
          size=$(docker buildx imagetools inspect "${IMAGE}@${digest}" --raw \
            | jq '[.layers[].size] | add')
          mb=$((size / 1024 / 1024))
          echo "compressed size (amd64): ${mb} MB"
          [ "$mb" -le 250 ] || { echo "image exceeds 250 MB compressed budget"; exit 1; }
        env:
          IMAGE: ${{ env.IMAGE }}
