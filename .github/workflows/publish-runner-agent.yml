name: Publish runner-agent image

# Builds and publishes the BYO runner *agent* image — the long-running
# control-plane container that operators launch with
#   docker run ghcr.io/mergecrew/runner-agent:latest --token … --api-url …
# (see /settings/runner-agents and docs/03-infrastructure/34-runner-agent.md).
#
# This is DISTINCT from `publish-runner-images.yml`, which builds the
# per-run *workspace* stacks (runner-node, runner-python, …) that the
# docker SandboxDriver launches into. Without this workflow the agent
# image never reaches GHCR, so the onboarding `docker run` fails with
# `denied` (the package simply does not exist).
#
# IMPORTANT: after the first successful push, make the GHCR package public
# (Org → Packages → runner-agent → Package settings → Change visibility →
# Public). Otherwise anonymous `docker pull` still returns `denied`.
#
# Triggers:
#   * push to main when the agent source changes → rolling `latest` + sha tag
#   * tag `runner-agent-v*` → publish that semver verbatim (+ latest)
#   * workflow_dispatch → on-demand republish

on:
  push:
    branches: [main]
    paths:
      - 'apps/runner-agent/**'
      - 'packages/**'
      - 'infra/docker/Dockerfile.runner-agent'
      - 'pnpm-lock.yaml'
      - '.github/workflows/publish-runner-agent.yml'
    tags:
      - 'runner-agent-v*'
  workflow_dispatch:

concurrency:
  group: publish-runner-agent-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: self-hosted
    env:
      IMAGE: ghcr.io/mergecrew/runner-agent
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tags
        id: tags
        run: |
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/runner-agent-v* ]]; then
            echo "semver=${GITHUB_REF#refs/tags/runner-agent-v}" >> "$GITHUB_OUTPUT"
          else
            echo "semver=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.runner-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.semver != '' && format('{0}:{1}', env.IMAGE, steps.tags.outputs.semver) || '' }}
          provenance: false
          cache-from: type=gha,scope=runner-agent
          cache-to: type=gha,scope=runner-agent,mode=max

      - name: Image contract — entrypoint responds to --help
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.tags.outputs.sha_tag }}"
          docker pull "$IMG"
          docker run --rm "$IMG" --help

      - name: Image contract — docker CLI is present (sandbox driver needs it)
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.tags.outputs.sha_tag }}"
          docker run --rm --entrypoint sh "$IMG" -c 'command -v docker >/dev/null || { echo "docker CLI missing"; exit 1; }'
