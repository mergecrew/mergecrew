name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mergecrew
          POSTGRES_PASSWORD: mergecrew
          POSTGRES_DB: mergecrew
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mergecrew -d mergecrew"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://mergecrew:mergecrew@localhost:5432/mergecrew?schema=public
      DATABASE_MIGRATE_URL: postgresql://mergecrew:mergecrew@localhost:5432/mergecrew?schema=public
      REDIS_URL: redis://localhost:6379
      KMS_MASTER_KEY: base64:0000000000000000000000000000000000000000000=
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - name: Bootstrap Postgres roles + extensions
        env:
          PGPASSWORD: mergecrew
        run: psql -h localhost -U mergecrew -d mergecrew -f infra/sql/init/00-roles.sql
      - run: pnpm --filter @mergecrew/db generate
      - run: pnpm --filter @mergecrew/db migrate
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test --if-present
      - name: OpenAPI spec is up to date
        run: |
          pnpm --filter @mergecrew/api openapi:export
          git diff --exit-code -- docs/openapi.json || {
            echo "::error::docs/openapi.json is stale. Run 'pnpm --filter @mergecrew/api openapi:export' and commit the result."
            exit 1
          }
      - name: SDK types are regenerated from the spec
        run: |
          pnpm --filter @mergecrew/sdk generate
          git diff --exit-code -- packages/sdk-ts/src/generated.ts || {
            echo "::error::packages/sdk-ts/src/generated.ts is stale. Run 'pnpm --filter @mergecrew/sdk generate' and commit the result."
            exit 1
          }
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Python SDK tests
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest
