services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mergecrew-postgres
    environment:
      POSTGRES_USER: mergecrew
      POSTGRES_PASSWORD: mergecrew
      POSTGRES_DB: mergecrew
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mergecrew -d mergecrew']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mergecrew-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: mergecrew-localstack
    environment:
      SERVICES: s3,kms
      DEFAULT_REGION: us-east-1
      DEBUG: '0'
    ports:
      - '4566:4566'
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  redis_data:
  localstack_data:
