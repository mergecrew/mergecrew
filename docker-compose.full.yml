# One-command self-host for trial use (#223, #315). Boots the whole stack —
# Postgres, Redis, MinIO (S3-compatible), API, orchestrator, runner,
# worker-cron, web — plus a one-shot migrate + seed so the operator lands
# on a usable web UI at http://localhost:3000 with a pre-created `demo` org.
#
# Profiles:
#   default        — full app stack on its own (assumes an LLM key is set or
#                    that you point an existing profile at an external host)
#   with-ollama    — also brings up Ollama on http://ollama:11434 and pre-pulls
#                    a small model (llama3.2:3b). Slower first-run, but means
#                    zero outside API keys are needed for evaluation.
#
# Usage:
#   docker compose -f docker-compose.full.yml up                   # without Ollama
#   docker compose -f docker-compose.full.yml --profile with-ollama up
#
# For production self-host use docker-compose.prod.yml instead — it
# expects host-installed Postgres, an external reverse proxy, and
# per-service resource limits.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mergecrew-postgres
    environment:
      POSTGRES_USER: mergecrew
      POSTGRES_PASSWORD: mergecrew
      POSTGRES_DB: mergecrew
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mergecrew -d mergecrew']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mergecrew-redis
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object store for transcripts + artifacts. Default
  # credentials are well-known + dev-only; rotate or replace with real
  # AWS in production. Web console exposed on :9001 for debugging.
  minio:
    image: minio/minio:latest
    container_name: mergecrew-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mergecrew
      MINIO_ROOT_PASSWORD: mergecrew-dev-only
    volumes:
      - minio_data:/data
    networks: [internal]
    ports:
      - '127.0.0.1:9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: creates the `mergecrew` bucket if it doesn't exist. Every
  # app service waits on this completing successfully via depends_on so
  # the transcript-store never writes against a missing bucket.
  minio-init:
    image: minio/mc:latest
    container_name: mergecrew-minio-init
    networks: [internal]
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mergecrew mergecrew-dev-only &&
      mc mb --ignore-existing local/mergecrew &&
      echo 'minio-init: bucket ready'
      "
    restart: 'no'

  # One-shot: applies the Prisma migration set, then exits. Every app
  # service waits on this completing successfully via depends_on, so the
  # API never starts against a schema-less DB.
  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      # GHA build cache (CI-only). Compose passes these through to
      # buildx; outside CI they're no-ops because `type=gha` requires
      # the GitHub-supplied auth env. Each image gets its own scope
      # so unrelated PRs don't invalidate each other.
      cache_from:
        - type=gha,scope=api
      cache_to:
        - type=gha,scope=api,mode=max
    image: mergecrew/api:latest
    container_name: mergecrew-migrate
    environment:
      <<: &default_env
        NODE_ENV: development
        DATABASE_URL: postgresql://mergecrew:mergecrew@postgres:5432/mergecrew?schema=public
        DATABASE_MIGRATE_URL: postgresql://mergecrew_migrator:mergecrew_migrator@postgres:5432/mergecrew?schema=public
        REDIS_URL: redis://redis:6379
        KMS_MASTER_KEY: 'base64:0000000000000000000000000000000000000000000='
        JWT_SECRET: dev-secret
        NEXTAUTH_SECRET: dev-secret
        NEXTAUTH_URL: http://localhost:3000
        API_BASE_URL: http://api:4000
        WEB_BASE_URL: http://localhost:3000
        # S3 (MinIO) — transcript-store + artifact-store honor S3_ENDPOINT_URL
        # so the same code paths run against AWS S3, MinIO, and LocalStack
        # without a kind switch.
        S3_ENDPOINT_URL: http://minio:9000
        TRANSCRIPT_S3_BUCKET: mergecrew
        ARTIFACT_S3_BUCKET: mergecrew
        AWS_ACCESS_KEY_ID: mergecrew
        AWS_SECRET_ACCESS_KEY: mergecrew-dev-only
        AWS_REGION: us-east-1
        # Dev auto-login wires the seeded demo user without OAuth setup
        # so the operator lands directly on a usable UI.
        MERGECREW_DEV_AUTO_LOGIN: 'true'
        MERGECREW_DEV_USER_EMAIL: demo@mergecrew.local
        MERGECREW_DEV_USER_NAME: Demo User
        BFF_TRUST_TOKEN: dev-trust-token
        LOG_LEVEL: info
        # Plumbed through for the local-stack e2e (#228). Empty in normal
        # trial use; set to `1` by scripts/e2e-local.sh so the agent loop
        # returns deterministic `completed` outcomes without an LLM call.
        MERGECREW_AGENT_STUB: '${MERGECREW_AGENT_STUB:-}'
        # V2.ag demo mode (#374). Defaults to `1` so a fresh
        # `docker compose up` delivers a clickable demo without forcing
        # the operator to wire an LLM provider first. Aliases
        # MERGECREW_AGENT_STUB on the runtime side; the web reads it
        # to render the demo-mode banner. Operators flip to `0` (and
        # configure a real LLM in Settings) once they outgrow the demo.
        MERGECREW_DEMO_MODE: '${MERGECREW_DEMO_MODE:-1}'
        # Opt-in telemetry receiver URL (#253). Empty by default — the
        # transport stays NoopTransport, no events leave the box. Point
        # at infra/telemetry/server.mjs or your own collector to opt in.
        # Org-level enable also still required (Settings → Anonymous
        # usage telemetry).
        MERGECREW_TELEMETRY_URL: '${MERGECREW_TELEMETRY_URL:-}'
        # Same — passed only when the e2e harness pre-issues an API key
        # via the seed and needs the operator-role token available later.
        MERGECREW_E2E_LOCAL_API_KEY: '${MERGECREW_E2E_LOCAL_API_KEY:-}'
        # Trusted-org allowlist for the instance-builtin runner profile
        # (ADR-0006). Only listed slugs may pick `instance_builtin` —
        # everyone else must BYO. Plus the implicit owner slug below.
        # See docs/03-infrastructure/16-self-host-runbook.md § Trust an
        # org for the instance-builtin runner profile.
        MERGECREW_TRUSTED_ORG_SLUGS: '${MERGECREW_TRUSTED_ORG_SLUGS:-}'
        MERGECREW_OWNER_ORG_SLUG: '${MERGECREW_OWNER_ORG_SLUG:-}'
        # Shared supervisor → API mediator secret (V2.ag / ADR-0009).
        # Generate a random 32+ char string per deployment and set
        # the same value here. Leave empty to disable the BYO
        # executor mediator (the stub executor still surfaces a
        # clear error).
        MERGECREW_INTERNAL_TOKEN: '${MERGECREW_INTERNAL_TOKEN:-}'
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
    # The hoisted-linker pnpm install drops the prisma binary into
    # packages/db's own node_modules rather than at the root .bin
    # (since `prisma` isn't in `.npmrc`'s public-hoist-pattern). The
    # Dockerfile sets WORKDIR to /app/apps/api, so go up to /app to
    # find packages/db.
    working_dir: /app
    # Prisma 7 reads connection config from prisma.config.ts (#794).
    # The file lives at packages/db/prisma.config.ts; without --config
    # the CLI searches cwd (/app) and the schema's parent
    # (/app/packages/db/prisma) and finds neither, then bails with
    # "datasource.url required."
    command:
      [
        'packages/db/node_modules/.bin/prisma',
        'migrate',
        'deploy',
        '--config',
        'packages/db/prisma.config.ts',
        '--schema',
        'packages/db/prisma/schema.prisma',
      ]
    restart: 'no'

  # One-shot: seeds the price table + a `demo` org + `demo@mergecrew.local`
  # user, so MERGECREW_DEV_AUTO_LOGIN drops the operator straight onto a
  # working dashboard with no manual signup.
  seed:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: mergecrew/api:latest
    container_name: mergecrew-seed
    environment:
      <<: *default_env
    networks: [internal]
    depends_on:
      migrate: { condition: service_completed_successfully }
    working_dir: /app
    command:
      - node
      - packages/db/dist/seed.js
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: mergecrew/api:latest
    container_name: mergecrew-api
    restart: unless-stopped
    environment:
      <<: *default_env
    networks: [internal]
    ports:
      - '127.0.0.1:4000:4000'
    depends_on:
      seed: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }

  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.orchestrator
      cache_from:
        - type=gha,scope=orchestrator
      cache_to:
        - type=gha,scope=orchestrator,mode=max
    image: mergecrew/orchestrator:latest
    container_name: mergecrew-orchestrator
    restart: unless-stopped
    environment:
      <<: *default_env
    networks: [internal]
    depends_on:
      seed: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }

  runner:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.runner
      cache_from:
        - type=gha,scope=runner
      cache_to:
        - type=gha,scope=runner,mode=max
    image: mergecrew/runner:latest
    container_name: mergecrew-runner
    restart: unless-stopped
    environment:
      <<: *default_env
      # See runner block in docker-compose.prod.yml + EPIC #828. Same
      # path inside and outside the bind mount below so workspace
      # paths are resolvable by the host daemon for sandbox `-v` flags.
      RUNNER_WORKSPACE_ROOT: /var/mergecrew/work
    networks: [internal]
    volumes:
      # Docker-out-of-docker wiring (EPIC #828). Required for
      # RUNNER_SANDBOX=docker. Pre-create the host workspace dir with
      # `mkdir -p /var/mergecrew/work && chown 1000:1000 /var/mergecrew/work`.
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/mergecrew/work:/var/mergecrew/work
    depends_on:
      seed: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }

  worker-cron:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker-cron
      cache_from:
        - type=gha,scope=worker-cron
      cache_to:
        - type=gha,scope=worker-cron,mode=max
    image: mergecrew/worker-cron:latest
    container_name: mergecrew-worker-cron
    restart: unless-stopped
    environment:
      <<: *default_env
    networks: [internal]
    depends_on:
      seed: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      cache_from:
        - type=gha,scope=web
      cache_to:
        - type=gha,scope=web,mode=max
    image: mergecrew/web:latest
    container_name: mergecrew-web
    restart: unless-stopped
    environment:
      <<: *default_env
      API_BASE_URL: http://api:4000
    networks: [internal]
    ports:
      - '127.0.0.1:3000:3000'
    depends_on: [api]

  # OSS-only LLM path. Slow on first run (model pull is ~2GB) so off by
  # default. Operators with their own Anthropic/OpenAI key don't need this.
  ollama:
    profiles: ['with-ollama']
    image: ollama/ollama:latest
    container_name: mergecrew-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks: [internal]
    ports:
      - '127.0.0.1:11434:11434'
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-shot: pulls a small chat model so the seeded LLM profile points
  # at something real. llama3.2:3b is a 2GB download — runs once, then
  # cached in the named volume across compose restarts.
  ollama-pull:
    profiles: ['with-ollama']
    image: ollama/ollama:latest
    container_name: mergecrew-ollama-pull
    entrypoint: >
      /bin/sh -c "
      OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2:3b &&
      echo 'ollama-pull: model ready'
      "
    networks: [internal]
    depends_on:
      ollama: { condition: service_healthy }
    restart: 'no'

networks:
  internal:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
